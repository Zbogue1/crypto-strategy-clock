<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Crypto Strategy Clock</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: #1e1e2e;
    --text: #e0e0f0;
    --muted: #6e6e8e;
    --green: #00c853;
    --red: #ff1744;
    --orange: #ff9800;
    --blue: #448aff;
    --purple: #c980ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 1.8rem; letter-spacing: 2px; color: var(--purple); }
  .header .sub { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
  .last-updated { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

  .signal-block {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 20px;
  }
  .signal-badge {
    display: inline-block; font-size: 2.2rem; font-weight: 800;
    letter-spacing: 6px; padding: 14px 40px; border-radius: 12px; margin-bottom: 14px;
  }
  .badge-BUY, .badge-STRONG_BUY { background: #00c85322; color: var(--green); border: 2px solid var(--green); }
  .badge-HOLD                   { background: #ff980022; color: var(--orange); border: 2px solid var(--orange); }
  .badge-SELL, .badge-STRONG_SELL { background: #ff174422; color: var(--red); border: 2px solid var(--red); }
  .coin-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
  .coin-price { font-size: 1rem; color: var(--muted); }
  .confidence-bar-wrap { margin: 14px auto 0; max-width: 320px; }
  .confidence-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
  .confidence-bar { background: #1e1e2e; border-radius: 8px; height: 10px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 8px; }
  .headline { font-style: italic; color: var(--muted); margin-top: 14px; font-size: 0.95rem; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
  .card p  { font-size: 0.92rem; line-height: 1.6; color: var(--text); }

  .portfolio-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .portfolio-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }
  .port-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .port-row:last-child { border-bottom: none; }
  .port-label { font-size: 0.85rem; color: var(--muted); }
  .port-value { font-size: 0.95rem; font-weight: 600; }
  .pos-green { color: var(--green); }
  .pos-red   { color: var(--red); }
  .pos-neutral { color: var(--text); }

  .cred-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px;
  }
  .cred-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }
  .cred-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a28; }
  .cred-row:last-child { border-bottom: none; }
  .cred-source { flex: 1; font-size: 0.88rem; }
  .cred-type { font-size: 0.72rem; color: var(--muted); background: #1e1e2e; padding: 2px 8px; border-radius: 4px; }
  .cred-bar-wrap { width: 80px; }
  .cred-bar { background: #1e1e2e; border-radius: 4px; height: 6px; overflow: hidden; }
  .cred-fill { height: 100%; border-radius: 4px; }
  .cred-pct { font-size: 0.8rem; text-align: right; margin-top: 2px; }
  .cred-count { font-size: 0.72rem; color: var(--muted); }

  .list-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .list-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
  .list-card li { font-size: 0.88rem; line-height: 1.55; margin-bottom: 8px; padding-left: 4px; }
  .list-card ul  { padding-left: 18px; }

  .market-pills { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .pill { background: #1e1e2e; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem; }
  .pill span { color: var(--muted); margin-right: 4px; }

  .signals-list { display: flex; flex-direction: column; gap: 8px; }
  .signal-pill { background: #1a1a28; border-radius: 8px; padding: 8px 12px; font-size: 0.83rem; line-height: 1.5; }
  .signal-pill .sig-type { font-size: 0.7rem; color: var(--muted); background: #252535; padding: 2px 7px; border-radius: 4px; margin-right: 6px; }

  .loading { text-align: center; color: var(--muted); padding: 60px; font-size: 1rem; }
  .error   { text-align: center; color: var(--red); padding: 40px; font-size: 0.9rem; background: var(--card); border-radius: 12px; }

  .refresh-btn {
    display: block; margin: 0 auto 24px; padding: 10px 28px;
    background: #1e1e2e; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.85rem; cursor: pointer;
  }
  .refresh-btn:hover { background: #252535; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔮 CRYPTO STRATEGY CLOCK</h1>
    <div class="sub">Swing Trading Intelligence Agent · Paper Portfolio</div>
    <div class="last-updated" id="lastUpdated">Loading…</div>
  </div>

  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  <div id="content"><div class="loading">⏳ Fetching latest data from the cloud…</div></div>
</div>

<script>
const REPO   = "Zbogue1/crypto-strategy-clock";
const BRANCH = "main";
const BASE   = "https://raw.githubusercontent.com/" + REPO + "/" + BRANCH;

async function fetchJSON(path) {
  const r = await fetch(BASE + "/" + path + "?t=" + Date.now());
  if (!r.ok) throw new Error(path + ": " + r.status);
  return r.json();
}

function signalLabel(sig) {
  const map = { STRONG_BUY: "STRONG BUY", BUY: "B U Y", HOLD: "H O L D", SELL: "S E L L", STRONG_SELL: "SELL NOW" };
  return map[sig] || sig || "–";
}

function pctColor(v) {
  if (v > 0) return "pos-green";
  if (v < 0) return "pos-red";
  return "pos-neutral";
}

function fmtPct(v) {
  if (v === undefined || v === null) return "–";
  const sign = v >= 0 ? "▲ +" : "▼ ";
  return sign + Math.abs(v).toFixed(2) + "%";
}

function credColor(wr) {
  if (wr >= 0.65) return "var(--green)";
  if (wr >= 0.45) return "var(--orange)";
  return "var(--red)";
}

async function loadData() {
  var content = document.getElementById("content");
  content.innerHTML = '<div class="loading">⏳ Fetching latest data…</div>';

  try {
    var results = await Promise.allSettled([
      fetchJSON("latest_analysis.json"),
      fetchJSON("paper_portfolio.json"),
      fetchJSON("signal_credibility.json")
    ]);

    var a  = results[0].status === "fulfilled" ? results[0].value : null;
    var p  = results[1].status === "fulfilled" ? results[1].value : null;
    var cr = results[2].status === "fulfilled" ? results[2].value : null;

    if (!a) {
      content.innerHTML = '<div class="error">⚠️ Could not load analysis data.<br><small>The agent may not have run yet, or the GitHub push hasn\'t happened yet.</small></div>';
      return;
    }

    document.getElementById("lastUpdated").textContent =
      "Last updated: " + (a.timestamp ? new Date(a.timestamp).toLocaleString() : "unknown");

    var sig  = a.signal || "HOLD";
    var conf = a.confidence || 0;
    var confColor = conf >= 70 ? "var(--green)" : conf >= 50 ? "var(--orange)" : "var(--red)";

    // Portfolio
    var portHTML = "";
    if (p) {
      var h = p.holding;
      var currentPrice = a.selected_coin_price || (h ? h.entry_price : 0);
      var holdingVal = h ? h.units * currentPrice : 0;
      var totalVal = p.cash + holdingVal;
      var overallPct = ((totalVal - 1000) / 1000 * 100).toFixed(2);
      var winRate = p.total_trades > 0 ? (p.winning_trades + "W / " + p.losing_trades + "L") : "No trades yet";

      var holdingHTML = "";
      if (h) {
        var unrPct = ((currentPrice - h.entry_price) / h.entry_price * 100).toFixed(2);
        holdingHTML =
          '<div class="port-row"><span class="port-label">Holding</span><span class="port-value">' + h.coin_ticker + ' × ' + parseFloat(h.units).toFixed(4) + ' units</span></div>' +
          '<div class="port-row"><span class="port-label">Entry → Now</span><span class="port-value">$' + h.entry_price.toLocaleString() + ' → $' + currentPrice.toLocaleString() + '</span></div>' +
          '<div class="port-row"><span class="port-label">Unrealized</span><span class="port-value ' + pctColor(parseFloat(unrPct)) + '">' + fmtPct(parseFloat(unrPct)) + '</span></div>' +
          (h.exit_target ? '<div class="port-row"><span class="port-label">Target / Stop</span><span class="port-value">$' + h.exit_target.toLocaleString() + ' / $' + (h.stop_loss||0).toLocaleString() + '</span></div>' : "");
      }

      portHTML =
        '<div class="portfolio-card"><h3>💼 Paper Portfolio · Started $1,000</h3>' +
        '<div class="port-row"><span class="port-label">Total Value</span><span class="port-value ' + pctColor(parseFloat(overallPct)) + '">$' + totalVal.toFixed(2) + ' (' + (parseFloat(overallPct) >= 0 ? "+" : "") + overallPct + '%)</span></div>' +
        '<div class="port-row"><span class="port-label">Cash Available</span><span class="port-value">$' + p.cash.toFixed(2) + '</span></div>' +
        '<div class="port-row"><span class="port-label">Realized P&L</span><span class="port-value ' + pctColor(p.realized_pnl) + '">$' + p.realized_pnl.toFixed(2) + '</span></div>' +
        '<div class="port-row"><span class="port-label">Trade Record</span><span class="port-value">' + winRate + '</span></div>' +
        holdingHTML + '</div>';
    }

    // Signal credibility
    var credHTML = "";
    if (cr && cr.signal_stats && Object.keys(cr.signal_stats).length > 0) {
      var stats = Object.values(cr.signal_stats).sort(function(a,b){ return b.win_rate - a.win_rate; });
      var rows = stats.slice(0, 8).map(function(s) {
        return '<div class="cred-row">' +
          '<div><div class="cred-source">' + s.source + '</div>' +
          '<div class="cred-count">' + s.wins + 'W / ' + s.losses + 'L · avg ' + (s.avg_return >= 0 ? "+" : "") + s.avg_return.toFixed(1) + '%</div></div>' +
          '<span class="cred-type">' + s.signal_type + '</span>' +
          '<div class="cred-bar-wrap"><div class="cred-bar"><div class="cred-fill" style="width:' + (s.win_rate*100).toFixed(0) + '%;background:' + credColor(s.win_rate) + '"></div></div>' +
          '<div class="cred-pct" style="color:' + credColor(s.win_rate) + '">' + (s.win_rate*100).toFixed(0) + '%</div></div>' +
          '</div>';
      }).join("");
      credHTML = '<div class="cred-card"><h3>🔮 Signal Credibility · ' + (cr.trade_count||0) + ' trades scored</h3>' +
        (rows || '<p style="color:var(--muted);font-size:.85rem">No trades scored yet — data builds after first sell.</p>') +
        '</div>';
    }

    // Key signals this cycle
    var keySignalsHTML = "";
    if (a.key_signals && a.key_signals.length > 0) {
      var pills = a.key_signals.map(function(s) {
        return '<div class="signal-pill"><span class="sig-type">' + s.signal_type + '</span><strong>' + s.source + '</strong>: ' + s.description + '</div>';
      }).join("");
      keySignalsHTML = '<div class="list-card"><h3>⚡ Key Signals This Cycle</h3><div class="signals-list">' + pills + '</div></div>';
    }

    // Risks + watchlist
    var risks   = (a.risk_factors||[]).map(function(r){ return "<li>"+r+"</li>"; }).join("");
    var watches = (a.watch_list||[]).map(function(w){ return "<li>"+w+"</li>"; }).join("");
    var mode    = (a["_mode"] || "HUNTING");

    content.innerHTML =
      '<div class="signal-block">' +
        '<div class="signal-badge badge-' + sig + '">' + signalLabel(sig) + '</div>' +
        '<div class="coin-name">' + (a.selected_coin_name||"") + ' (' + (a.selected_coin||"") + ')</div>' +
        '<div class="coin-price">$' + (a.selected_coin_price||0).toLocaleString() + '</div>' +
        '<div class="confidence-bar-wrap">' +
          '<div class="confidence-label">Confidence: ' + conf + '%</div>' +
          '<div class="confidence-bar"><div class="confidence-fill" style="width:' + conf + '%;background:' + confColor + '"></div></div>' +
        '</div>' +
        '<div class="headline">"' + (a.layman_headline||"") + '"</div>' +
      '</div>' +

      '<div class="card" style="margin-bottom:20px"><h3>📊 Market Context</h3>' +
        '<div class="market-pills">' +
          '<div class="pill"><span>BTC</span>$' + (a.btc_price||0).toLocaleString() + '</div>' +
          '<div class="pill"><span>Dominance</span>' + (a.btc_dominance||0) + '%</div>' +
          '<div class="pill"><span>Fear & Greed</span>' + (a.fear_greed||"–") + '</div>' +
          '<div class="pill"><span>Mode</span>' + mode + '</div>' +
        '</div>' +
        (a.market_context ? '<p style="margin-top:12px;font-size:.88rem;color:var(--muted)">' + a.market_context + '</p>' : "") +
      '</div>' +

      '<div class="grid">' +
        '<div class="card"><h3>📖 What\'s Happening</h3><p>' + (a.layman_explanation||"–") + '</p></div>' +
        '<div class="card"><h3>👉 Suggested Action</h3><p>' + (a.layman_action||"–") + '</p></div>' +
      '</div>' +

      portHTML +
      credHTML +
      keySignalsHTML +

      (risks || watches ? '<div class="grid">' +
        (risks   ? '<div class="list-card"><h3>⚠️ Risks to Watch</h3><ul>' + risks + '</ul></div>' : '') +
        (watches ? '<div class="list-card"><h3>👁 Monitor Next 48h</h3><ul>' + watches + '</ul></div>' : '') +
      '</div>' : "") +

      '<div class="card" style="margin-bottom:20px"><h3>🧠 Expert Reasoning</h3><p>' + (a.expert_reasoning||"–") + '</p></div>';

  } catch(err) {
    content.innerHTML = '<div class="error">⚠️ ' + err.message + '<br><small>Make sure the agent has run at least once and pushed to GitHub.</small></div>';
  }
}

loadData();
</script>
</body>
</html>
